<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to HoneyLove</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #F4F4F4; /* --hl-surface */
            margin: 0;
            padding: 0;
            color: #0F172A; /* --hl-text */
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #FFFFFF;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); /* --sh-card adapted */
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.08); /* --hl-border */
        }
        .header {
            background-color: #FFFFFF;
            padding: 32px 0 24px;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }
        .logo {
            height: 48px;
            margin-bottom: 0;
        }
        .content {
            padding: 40px 32px;
            text-align: center;
        }
        h1 {
            color: #0F172A;
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 16px;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #475569; /* --text-secondary */
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(180deg, #C19B4A 0%, #B78E3F 100%); /* --hl-gold to --hl-gold-strong */
            color: #111111; /* Contrast text on gold */
            font-weight: 600;
            padding: 14px 36px;
            border-radius: 9999px;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 8px 24px rgba(193, 155, 74, 0.25);
        }
        .btn:hover {
            opacity: 0.95;
            transform: translateY(-1px);
            box-shadow: 0 12px 30px rgba(193, 155, 74, 0.35);
        }
        .footer {
            background-color: #F7F7F8; /* --hl-surface--light */
            padding: 24px;
            text-align: center;
            font-size: 14px;
            color: #64748b; /* --text-muted */
            border-top: 1px solid rgba(0,0,0,0.08);
        }
        .footer a {
            color: #C19B4A; /* --hl-gold */
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="{{ backend_url }}/static/branding_with_text.svg" alt="HoneyLove" class="logo" onerror="this.onerror=null; this.src='{{ dashboard_url }}/branding_with_text.svg'">
            <h2 style="display:none; color:#C19B4A; margin:0;">HoneyLove</h2>
        </div>
        <div class="content">
            <h1>Welcome to HoneyLove!</h1>
            <p>
                Hi {{ full_name }},<br>
                We're thrilled to have you join us. Your account is ready to go!
            </p>
            <p>
                Dive into a world of unique characters and meaningful conversations.
            </p>
            
            <a href="{{ dashboard_url }}" class="btn">Start Exploring</a>
        </div>
        <div class="footer">
            <p>&copy; {{ year }} {{ app_name }}. All rights reserved.</p>
            <p>{{ company_address }}</p>
            <p>
                <a href="mailto:{{ support_email }}">Contact Support</a>
            </p>
        </div>
    </div>
</body>
</html>
