version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: "redis://redis:6379/0"
      REQUIRE_REDIS: "1"
    depends_on:
      - redis
    volumes:
      - ./:/app:cached

volumes:
  redis-data:
